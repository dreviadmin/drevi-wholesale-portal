# Hourly off-site backup: pulls the full-database export from the portal and
# stores it as a GitHub artifact (90-day retention, private repo). This is the
# free-tier safety net — Supabase Free has no managed backups. Hourly (was
# daily) since exhibition days write real money orders all day; the export is
# tiny, so 24 artifacts/day is negligible.
#
# Repo secrets required: PORTAL_URL, CRON_SECRET (same as sync-cron.yml).
name: daily-backup

on:
  schedule:
    - cron: "17 * * * *" # hourly at :17
  workflow_dispatch: {}

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Download backup
        run: |
          set -e
          code=$(curl -s -o backup.json.gz -w "%{http_code}" --max-time 120 \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.PORTAL_URL }}/api/cron/backup")
          echo "HTTP $code"
          [ "$code" = "200" ]
          gunzip -t backup.json.gz
          ls -la backup.json.gz
      - name: Store artifact
        uses: actions/upload-artifact@v6
        with:
          name: drevi-backup-${{ github.run_number }}
          path: backup.json.gz
          retention-days: 90
